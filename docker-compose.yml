version: '3.8'

services:
  python-service:
    build: ./python-services
    ports:
      - "8000:8000"
    env_file:
      - ./python-services/.env
    volumes:
      - ./python-services:/app
    restart: unless-stopped

  nextjs:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - python-service
    restart: unless-stopped